<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cubical Type Theory — AST Visualizer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  background: #0a0a0f; color: #e0e0e0;
  overflow: hidden; height: 100vh;
}
#header {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  background: #12121a; border-bottom: 1px solid #2a2a3a;
  display: flex; align-items: center; padding: 0 16px; z-index: 100; gap: 10px;
}
#header h1 { font-size: 14px; font-weight: 600; color: #7aa2f7; white-space: nowrap; }
#header .sep { color: #3a3a4a; }
#file-input { display: none; }
.btn {
  background: #1a1a2e; border: 1px solid #3a3a5a; color: #a0a0c0;
  padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.btn:hover { background: #2a2a4e; color: #e0e0ff; border-color: #5a5a8a; }
.btn.active { background: #2a2a4e; color: #7aa2f7; border-color: #7aa2f7; }
#tab-bar { display: none; gap: 0; }
.tab {
  background: transparent; border: 1px solid #3a3a5a; border-bottom: none;
  color: #6a6a8a; padding: 6px 14px; font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all 0.15s; margin-right: -1px;
  border-radius: 4px 4px 0 0;
}
.tab:hover { color: #a0a0c0; }
.tab.active { background: #0a0a0f; color: #7aa2f7; border-color: #5a5a8a; }
#search-box {
  background: #0a0a0f; border: 1px solid #3a3a5a; color: #c0c0e0;
  padding: 4px 10px; border-radius: 4px; font-size: 12px; font-family: inherit;
  width: 200px; outline: none; transition: border-color 0.15s;
}
#search-box:focus { border-color: #7aa2f7; }
#search-box::placeholder { color: #3a3a5a; }
#search-count { font-size: 11px; color: #5a5a7a; white-space: nowrap; }
#def-name { font-size: 12px; color: #bb9af7; white-space: nowrap; }
#drop-zone {
  position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center; z-index: 50;
}
#drop-hint { text-align: center; color: #4a4a6a; font-size: 14px; }
#drop-hint .big { font-size: 48px; margin-bottom: 16px; }
#drop-hint code { background: #1a1a2e; padding: 2px 6px; border-radius: 3px; color: #7aa2f7; }
#drop-hint .sub { font-size: 12px; margin-top: 12px; color: #3a3a5a; }
#main-area { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; display: none; }
#tree-container { position: absolute; top: 0; left: 0; right: 320px; bottom: 0; }
#text-panel {
  position: absolute; top: 0; right: 0; bottom: 0; width: 400px;
  background: #0e0e16; border-left: 1px solid #2a2a3a;
  display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s;
}
#text-panel.collapsed { width: 0; border-left: none; }
#text-panel.collapsed .text-panel-inner { display: none; }
.text-panel-inner { display: flex; flex-direction: column; height: 100%; padding: 12px; }
.text-panel-header {
  font-size: 11px; color: #5a5a7a; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.text-panel-header .close-btn { margin-left: auto; cursor: pointer; color: #5a5a7a; font-size: 16px; }
.text-panel-header .close-btn:hover { color: #f7768e; }
.text-section { margin-bottom: 16px; }
.text-section-label {
  font-size: 10px; color: #5a5a7a; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 4px;
}
.text-section-content {
  font-size: 12px; color: #c0c0e0; background: #12121a;
  border: 1px solid #1a1a2e; border-radius: 4px; padding: 8px 10px;
  word-break: break-all; line-height: 1.6; white-space: pre-wrap;
  max-height: 200px; overflow-y: auto;
}
.text-section-content .highlight {
  background: #7aa2f733; border-bottom: 2px solid #7aa2f7;
  border-radius: 2px; padding: 0 1px;
}

/* ── Trace panel ── */
#trace-section { margin-bottom: 16px; }
#trace-section .text-section-label { cursor: pointer; user-select: none; }
#trace-section .text-section-label:hover { color: #7aa2f7; }
.trace-step {
  padding: 4px 8px; margin-bottom: 2px; border-radius: 4px;
  cursor: pointer; transition: background 0.1s; font-size: 11px;
  border-left: 3px solid transparent; display: flex; gap: 6px; align-items: flex-start;
}
.trace-step:hover { background: #1a1a2e; }
.trace-step.active { background: #1a1a2e; border-left-color: #7aa2f7; }
.trace-step .step-num { color: #3a3a5a; min-width: 20px; text-align: right; font-size: 10px; }
.trace-step .step-body { flex: 1; min-width: 0; }
.trace-step .step-rule {
  display: inline-block; font-size: 9px; padding: 1px 5px;
  border-radius: 3px; font-weight: 600; letter-spacing: 0.3px;
  margin-bottom: 2px;
}
.rule-beta { background: #7aa2f722; color: #7aa2f7; }
.rule-path-app { background: #ff9e6422; color: #ff9e64; }
.rule-fst-pair, .rule-snd-pair { background: #9ece6a22; color: #9ece6a; }
.rule-elim-con, .rule-elim-pcon { background: #f7768e22; color: #f7768e; }
.rule-transport-const, .rule-transport-univ, .rule-transport-pi,
.rule-transport-path, .rule-transport-sigma, .rule-transport-ua,
.rule-transport-glue { background: #73daca22; color: #73daca; }
.rule-equiv-fwd { background: #bb9af722; color: #bb9af7; }
.rule-hcomp-top, .rule-hcomp-bot { background: #e0af6822; color: #e0af68; }
.trace-step .step-input, .trace-step .step-output {
  display: block; color: #8080a0; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; font-family: 'SF Mono', 'Fira Code', monospace;
  transition: color 0.15s;
}
.trace-step .step-arrow { color: #3a3a5a; }
.trace-step:hover .step-input, .trace-step:hover .step-output { color: #c0c0e0; }
#trace-list { max-height: 300px; overflow-y: auto; }
#trace-list::-webkit-scrollbar { width: 4px; }
#trace-list::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
#trace-list::-webkit-scrollbar-track { background: transparent; }
svg { width: 100%; height: 100%; }
.link { fill: none; stroke: #2a2a4a; stroke-width: 1.5; stroke-opacity: 0.6; }
.link.dimmed { stroke-opacity: 0.08; }
.link.highlighted { stroke: #7aa2f7; stroke-opacity: 1; stroke-width: 2.5; }
.node circle { stroke-width: 2; cursor: pointer; transition: r 0.15s, opacity 0.2s; }
.node circle:hover { filter: brightness(1.3); }
.node.dimmed circle { opacity: 0.12; }
.node.dimmed text { opacity: 0.12; }
.node.highlighted circle { stroke: #fff; stroke-width: 3; filter: drop-shadow(0 0 8px rgba(122,162,247,0.8)); }
.node.highlighted text { font-weight: bold; }
.node text {
  font-size: 11px; fill: #c0c0e0; pointer-events: none;
  font-family: 'SF Mono', 'Fira Code', monospace; transition: opacity 0.2s;
}
#info-panel {
  position: fixed; bottom: 16px; left: 16px; background: #12121aee;
  border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px 16px;
  font-size: 11px; color: #8080a0; max-width: 360px; z-index: 100;
}
#info-panel .label { color: #5a5a7a; margin-bottom: 2px; }
#info-panel .value { color: #a0a0c0; word-break: break-all; }
#zoom-info { position: fixed; bottom: 16px; right: 336px; font-size: 11px; color: #3a3a5a; z-index: 100; }
#zoom-info.panel-collapsed { right: 16px; }
.kind-Var { fill: #9ece6a; } .kind-App { fill: #ff9e64; } .kind-Abs { fill: #7aa2f7; }
.kind-Univ { fill: #bb9af7; } .kind-IntervalTy { fill: #e0af68; } .kind-Interval { fill: #e0af68; }
.kind-Cube { fill: #e0af68; } .kind-Pi { fill: #7dcfff; } .kind-Path { fill: #f7768e; }
.kind-PLam { fill: #ff7a93; } .kind-PApp { fill: #ff9e64; } .kind-HComp { fill: #73daca; }
.kind-Equiv { fill: #bb9af7; } .kind-MkEquiv { fill: #bb9af7; }
.kind-EquivFwd { fill: #bb9af7; } .kind-Ua { fill: #bb9af7; }
.kind-Transport { fill: #73daca; } .kind-Glue { fill: #7dcfff; }
.kind-GlueElem { fill: #7dcfff; } .kind-Unglue { fill: #7dcfff; }
.kind-Sigma { fill: #7dcfff; } .kind-Pair { fill: #ff9e64; }
.kind-Fst { fill: #ff9e64; } .kind-Snd { fill: #ff9e64; }
.kind-Data { fill: #c0caf5; } .kind-Con { fill: #9ece6a; }
.kind-PCon { fill: #ff7a93; } .kind-Elim { fill: #f7768e; } .kind-Case { fill: #f7768e; }
</style>
</head>
<body>

<div id="header">
  <h1>Cubical AST</h1>
  <span class="sep">|</span>
  <button class="btn" onclick="document.getElementById('file-input').click()">Open</button>
  <div id="tab-bar">
    <button class="tab active" data-view="normalized" onclick="switchView('normalized')">normalized</button>
    <button class="tab" data-view="raw" onclick="switchView('raw')">raw</button>
    <button class="tab" data-view="type" onclick="switchView('type')">type</button>
  </div>
  <span class="sep" id="tab-sep" style="display:none">|</span>
  <span id="def-name"></span>
  <div style="flex:1"></div>
  <input type="text" id="search-box" placeholder="Search kind or label... (Ctrl+K)" style="display:none">
  <span id="search-count" style="display:none"></span>
  <span class="sep" id="search-sep" style="display:none">|</span>
  <button class="btn" id="btn-text" onclick="toggleTextPanel()" style="display:none">Text (T)</button>
  <button class="btn" id="btn-fit" onclick="fitView()" style="display:none">Fit (F)</button>
  <button class="btn" id="btn-expand" onclick="expandAll()" style="display:none">Expand (E)</button>
  <button class="btn" id="btn-collapse" onclick="collapseAll()" style="display:none">Collapse (C)</button>
</div>

<input type="file" id="file-input" accept=".json">

<div id="drop-zone">
  <div id="drop-hint">
    <div class="big">&#x2B21;</div>
    Drop a <code>.json</code> AST file here<br>
    or click <strong>Open</strong> above
    <div class="sub">cargo run --bin cubical-viz -- file.uwuc &gt; term.json</div>
  </div>
</div>

<div id="main-area">
  <div id="tree-container"><svg id="svg"></svg></div>
  <div id="text-panel">
    <div class="text-panel-inner">
      <div class="text-panel-header">
        <span>Source</span>
        <span class="close-btn" onclick="toggleTextPanel()">&times;</span>
      </div>
      <div id="text-content"></div>
    </div>
  </div>
</div>

<div id="info-panel" style="display:none">
  <div class="label">Hover a node for details</div>
</div>
<div id="zoom-info"></div>

<script>
const kindColor = {
  Var:'#9ece6a',App:'#ff9e64',Abs:'#7aa2f7',Univ:'#bb9af7',
  IntervalTy:'#e0af68',Interval:'#e0af68',Cube:'#e0af68',
  Pi:'#7dcfff',Path:'#f7768e',PLam:'#ff7a93',PApp:'#ff9e64',
  HComp:'#73daca',Equiv:'#bb9af7',MkEquiv:'#bb9af7',
  EquivFwd:'#bb9af7',Ua:'#bb9af7',Transport:'#73daca',
  Glue:'#7dcfff',GlueElem:'#7dcfff',Unglue:'#7dcfff',
  Sigma:'#7dcfff',Pair:'#ff9e64',Fst:'#ff9e64',Snd:'#ff9e64',
  Data:'#c0caf5',Con:'#9ece6a',PCon:'#ff7a93',Elim:'#f7768e',Case:'#f7768e'
};
const colorOf = k => kindColor[k] || '#6a6a8a';

const svg = d3.select('#svg');
const container = svg.append('g');
const linkGroup = container.append('g').attr('class','links');
const nodeGroup = container.append('g').attr('class','nodes');
const zoomBehavior = d3.zoom().scaleExtent([0.05,5])
  .on('zoom', e => { container.attr('transform', e.transform); d3.select('#zoom-info').text('x'+e.transform.k.toFixed(2)); });
svg.call(zoomBehavior);

let root = null, currentData = null, currentView = null, searchQuery = '';
const duration = 350;

function isMultiTree(d) { return d && typeof d === 'object' && 'definition' in d; }
function showUI(multi) {
  d3.select('#drop-zone').style('display','none');
  d3.select('#main-area').style('display','block');
  ['btn-fit','btn-expand','btn-collapse','btn-text'].forEach(id => d3.select('#'+id).style('display','inline-block'));
  d3.select('#info-panel').style('display','block');
  d3.select('#search-box').style('display','inline-block');
  d3.select('#search-count').style('display','inline');
  d3.select('#search-sep').style('display','inline');
  if (multi) {
    d3.select('#tab-bar').style('display','flex');
    d3.select('#tab-sep').style('display','inline');
    d3.select('#def-name').style('display','inline');
  }
}
function clearTree() { linkGroup.selectAll('*').remove(); nodeGroup.selectAll('*').remove(); root = null; }

function switchView(view) {
  if (!currentData || !isMultiTree(currentData)) return;
  currentView = view;
  d3.selectAll('.tab').classed('active', false);
  d3.select('.tab[data-view="'+view+'"]').classed('active', true);
  clearTree(); loadTreeData(currentData[view]); updateTextPanel();
}

function loadTree(data) {
  currentData = data;
  if (isMultiTree(data)) {
    d3.select('#def-name').text(data.definition || '');
    d3.selectAll('.tab').style('display', function() { return data[this.dataset.view] ? 'inline-block' : 'none'; });
    showUI(true);
    var views = ['normalized','raw','type'].filter(function(v){return data[v];});
    currentView = views.indexOf('normalized') >= 0 ? 'normalized' : views[0];
    d3.select('.tab[data-view="'+currentView+'"]').classed('active', true);
    clearTree(); loadTreeData(data[currentView]); updateTextPanel();
  } else {
    showUI(false); currentView = null; clearTree(); loadTreeData(data);
  }
}

function loadTreeData(treeData) {
  root = d3.hierarchy(treeData); root.x0 = 0; root.y0 = 0;
  if (root.children) root.children.forEach(function(c){ collapse(c); });
  update(root); setTimeout(fitView, 100);
}
function collapse(d) { if (d.children) { d._children = d.children; d._children.forEach(collapse); d.children = null; } }

function update(source) {
  if (!root) return;
  d3.tree().nodeSize([28,200]).separation(function(a,b){return a.parent===b.parent?1:1.3;})(root);
  var nodes = root.descendants(), links = root.links();

  var link = linkGroup.selectAll('.link').data(links, function(d){return d.target.data.id;});
  link.enter().append('path').attr('class','link')
    .attr('d', function(){var o={x:source.x0,y:source.y0};return diagonal(o,o);})
    .merge(link).transition().duration(duration).attr('d', function(d){return diagonal(d.source,d.target);});
  link.exit().transition().duration(duration)
    .attr('d', function(){var o={x:source.x,y:source.y};return diagonal(o,o);}).remove();

  var node = nodeGroup.selectAll('.node').data(nodes, function(d){return d.data.id;});
  var nodeEnter = node.enter().append('g').attr('class','node')
    .attr('transform', 'translate('+source.y0+','+source.x0+')')
    .on('click', function(e,d) {
      e.stopPropagation();
      if (d.children) { d._children = d.children; d.children = null; }
      else if (d._children) { d.children = d._children; d._children = null; }
      update(d);
    })
    .on('mouseenter', function(e,d){ showInfo(d.data); highlightTextPanel(d.data); })
    .on('mouseleave', hideInfo);

  nodeEnter.append('circle').attr('r',0)
    .attr('fill', function(d){return colorOf(d.data.kind);})
    .attr('stroke', function(d){return d3.color(colorOf(d.data.kind)).darker(0.5);});
  nodeEnter.append('text').attr('dy','0.35em').attr('x',0).attr('text-anchor','middle').text('')
    .attr('fill', function(d){
      return ['#9ece6a','#ff9e64','#ff7a93'].indexOf(colorOf(d.data.kind))>=0 ? '#0a0a0f' : '#c0c0e0';
    });
  nodeEnter.append('text').attr('class','badge').attr('dy','-0.7em').attr('x',0)
    .attr('text-anchor','middle').attr('fill','#5a5a7a').attr('font-size','9px').text('');

  var nodeMerge = nodeEnter.merge(node);
  nodeMerge.transition().duration(duration).attr('transform', function(d){return 'translate('+d.y+','+d.x+')';});
  nodeMerge.select('circle').transition().duration(duration)
    .attr('r', function(d){return d._children?9:6;}).attr('fill', function(d){return colorOf(d.data.kind);});
  nodeMerge.select('text:not(.badge)')
    .attr('dy', function(d){return d._children?'-1.1em':(d.children?'1.4em':'-1.1em');})
    .attr('text-anchor','middle').text(function(d){return d.data.label||d.data.kind;});
  nodeMerge.select('.badge').text(function(d){return d._children?(''+d._children.length):'';});
  node.exit().transition().duration(duration)
    .attr('transform','translate('+source.y+','+source.x+')').remove().select('circle').attr('r',0);

  if (searchQuery) applySearch(searchQuery);
}

function diagonal(s,d) {
  return 'M '+s.y+' '+s.x+' C '+(s.y+d.y)/2+' '+s.x+', '+(s.y+d.y)/2+' '+d.x+', '+d.y+' '+d.x;
}
function fitView() {
  var bounds = container.node().getBBox();
  if (bounds.width===0||bounds.height===0) return;
  var w=svg.node().clientWidth, h=svg.node().clientHeight, pad=80;
  var scale=Math.min((w-pad*2)/bounds.width,(h-pad*2)/bounds.height,2.5);
  svg.transition().duration(500).call(zoomBehavior.transform,
    d3.zoomIdentity.translate(w/2-(bounds.x+bounds.width/2)*scale,h/2-(bounds.y+bounds.height/2)*scale).scale(scale));
}
function expandAll() {
  if(!root)return; root.each(function(d){if(d._children){d.children=d._children;d._children=null;}});
  update(root); setTimeout(fitView,400);
}
function collapseAll() {
  if(!root)return; root.each(function(d){if(d.children&&d.depth>0){d._children=d.children;d.children=null;}});
  update(root); setTimeout(fitView,400);
}

// ── Search ──
function applySearch(query) {
  searchQuery = query.trim().toLowerCase();
  if (!root) return;
  var allNodes = nodeGroup.selectAll('.node'), allLinks = linkGroup.selectAll('.link');
  if (!searchQuery) {
    allNodes.classed('dimmed',false).classed('highlighted',false);
    allLinks.classed('dimmed',false).classed('highlighted',false);
    d3.select('#search-count').text('');
    return;
  }
  var matchIds = new Set();
  root.descendants().forEach(function(d){
    var kind = (d.data.kind||'').toLowerCase(), label = (d.data.label||'').toLowerCase();
    if (kind.indexOf(searchQuery)>=0 || label.indexOf(searchQuery)>=0) matchIds.add(d.data.id);
  });
  allNodes.classed('dimmed',function(d){return !matchIds.has(d.data.id);})
    .classed('highlighted',function(d){return matchIds.has(d.data.id);});
  allLinks.classed('dimmed',function(d){return !matchIds.has(d.target.data.id);})
    .classed('highlighted',function(d){return matchIds.has(d.target.data.id);});
  d3.select('#search-count').text(matchIds.size+' match'+(matchIds.size!==1?'es':''));
}
document.getElementById('search-box').addEventListener('input', function(e){ applySearch(e.target.value); });

// ── Text panel ──
function toggleTextPanel() {
  var panel = d3.select('#text-panel');
  panel.classed('collapsed', !panel.classed('collapsed'));
  d3.select('#zoom-info').classed('panel-collapsed', panel.classed('collapsed'));
  d3.select('#btn-text').classed('active', !panel.classed('collapsed'));
}
function updateTextPanel() {
  if (!currentData || !isMultiTree(currentData)) {
    d3.select('#text-content').html('<div class="text-section"><div class="text-section-content">No text available</div></div>');
    return;
  }
  var raw = currentData.rawText||'-', nf = currentData.normalizedText||'-', ty = currentData.typeText||'-';
  var trace = currentData.trace || [];
  var html = '';
  html += '<div class="text-section"><div class="text-section-label">Type</div><div class="text-section-content" data-section="type">'+escHtml(ty)+'</div></div>';
  html += '<div class="text-section"><div class="text-section-label">Raw</div><div class="text-section-content" data-section="raw">'+escHtml(raw)+'</div></div>';
  html += '<div class="text-section"><div class="text-section-label">Normalized</div><div class="text-section-content" data-section="normalized">'+escHtml(nf)+'</div></div>';
  if (trace.length > 0) {
    html += '<div id="trace-section"><div class="text-section-label">Reduction Steps ('+trace.length+')</div>';
    html += '<div id="trace-list">';
    trace.forEach(function(s, i){
      var cls = 'rule-'+s.rule;
      html += '<div class="trace-step" data-step="'+i+'" onclick="selectTraceStep('+i+')">';
      html += '<span class="step-num">'+(i+1)+'</span>';
      html += '<div class="step-body">';
      html += '<span class="step-rule '+cls+'">'+escHtml(s.rule)+'</span>';
      html += '<span class="step-input">'+escHtml(s.input)+'</span>';
      html += '<span class="step-arrow"> \u2192 </span>';
      html += '<span class="step-output">'+escHtml(s.output)+'</span>';
      html += '</div></div>';
    });
    html += '</div></div>';
  }
  d3.select('#text-content').html(html);
}
function selectTraceStep(idx) {
  var steps = currentData && currentData.trace;
  if (!steps || idx < 0 || idx >= steps.length) return;
  d3.selectAll('.trace-step').classed('active', false);
  d3.select('.trace-step[data-step="'+idx+'"]').classed('active', true);
  var s = steps[idx];
  d3.select('#info-panel').html(
    '<div class="label">Reduction Step '+(idx+1)+'/'+steps.length+'</div>'+
    '<div class="label" style="margin-top:6px">Rule</div><div class="value" style="color:#73daca">'+escHtml(s.rule)+'</div>'+
    '<div class="label" style="margin-top:6px">Input</div><div class="value">'+escHtml(s.input)+'</div>'+
    '<div class="label" style="margin-top:6px">Output</div><div class="value">'+escHtml(s.output)+'</div>'
  );
}
function highlightTextPanel(data) {
  var label = data.label || '';
  if (!label) return;
  d3.selectAll('.text-section-content').each(function(){
    var el = d3.select(this), text = el.text();
    if (text.indexOf(label) >= 0) {
      el.html(escHtml(text).replace(new RegExp(escRegex(label),'g'), '<span class="highlight">'+escHtml(label)+'</span>'));
    }
  });
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ── Info panel ──
function showInfo(data) {
  d3.select('#info-panel').html(
    '<div class="label">Kind</div><div class="value" style="color:'+colorOf(data.kind)+'">'+data.kind+'</div>'+
    '<div class="label" style="margin-top:6px">Label</div><div class="value">'+(data.label||'-')+'</div>'+
    '<div class="label" style="margin-top:6px">Node ID</div><div class="value">#'+data.id+'</div>'
  );
}
function hideInfo() { d3.select('#info-panel').html('<div class="label">Hover a node for details</div>'); }

// ── File handling ──
document.getElementById('file-input').addEventListener('change', function(e){ if(e.target.files[0])readJson(e.target.files[0]); });
function readJson(file) {
  var reader = new FileReader();
  reader.onload = function() {
    try { var data = JSON.parse(reader.result); loadTree(data); }
    catch(err) { alert('Invalid JSON: '+err.message); }
  };
  reader.readAsText(file);
}
document.body.addEventListener('dragover', function(e){e.preventDefault();e.dataTransfer.dropEffect='copy';});
document.body.addEventListener('drop', function(e){
  e.preventDefault(); var f=e.dataTransfer.files[0];
  if(f&&f.name.endsWith('.json'))readJson(f);
});

// ── Keyboard shortcuts ──
document.addEventListener('keydown', function(e) {
  if (e.target.tagName==='INPUT'&&e.target.id!=='search-box') return;
  if ((e.ctrlKey&&e.key==='k')||(e.key==='/'&&e.target.id!=='search-box')) {
    e.preventDefault(); document.getElementById('search-box').focus(); return;
  }
  if (e.key==='Escape'&&e.target.id==='search-box') {
    e.target.value=''; applySearch(''); e.target.blur(); return;
  }
  if (e.target.id==='search-box') return;
  if(e.key==='f'||e.key==='F')fitView();
  if(e.key==='e'||e.key==='E')expandAll();
  if(e.key==='c'||e.key==='C')collapseAll();
  if(e.key==='t'||e.key==='T')toggleTextPanel();
  if(e.key==='1')switchView('normalized');
  if(e.key==='2')switchView('raw');
  if(e.key==='3')switchView('type');
  if(e.key==='ArrowDown'||e.key==='ArrowUp') {
    var active = document.querySelector('.trace-step.active');
    if (active) {
      var steps = document.querySelectorAll('.trace-step');
      var idx = Array.from(steps).indexOf(active);
      if (e.key==='ArrowDown' && idx < steps.length-1) selectTraceStep(idx+1);
      if (e.key==='ArrowUp' && idx > 0) selectTraceStep(idx-1);
      var el = document.querySelector('.trace-step.active');
      if (el) el.scrollIntoView({block:'nearest'});
    }
  }
});
</script>
</body>
